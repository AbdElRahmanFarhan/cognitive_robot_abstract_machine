name: Random Events Lib Tests

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Bazel 7.0.0
        run: |
          BAZEL_VERSION=7.0.0
          curl -L -o bazel.sh \
            https://github.com/bazelbuild/bazel/releases/download/${BAZEL_VERSION}/bazel-${BAZEL_VERSION}-installer-linux-x86_64.sh
          chmod +x bazel.sh
          ./bazel.sh --user
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Build and test
        working-directory: random_events/src/random_events_lib
        run: |
          bazel build //test:test_all
          bazel test //test:test_all